# Le immagini applicative vengono ricostruite da build-backend / build-frontend prima dell'avvio dei servizi.
#   docker compose up -d
services:
  build-backend:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    working_dir: /workspace
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-payment-gateway}
    entrypoint: ["/bin/sh", "./scripts/build-backend.sh"]
    restart: "no"

  build-frontend:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    working_dir: /workspace
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-payment-gateway}
    entrypoint: ["/bin/sh", "./scripts/build-frontend.sh"]
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payments}
      POSTGRES_USER: ${POSTGRES_USER:-payments_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payments_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_user -d payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Apache Kafka in modalità KRaft (senza Zookeeper).
  # Doppio listener: 29092 = rete Docker, 9092 = host locale (IDE / mvn spring-boot:run).
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Topic creati da payment-service (bean NewTopic), non auto-creati
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      build-backend:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-payments}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payments_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payments_pass}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    healthcheck:
      # Flyway gira all'avvio di payment-service; gli altri servizi attendono che sia healthy
      # così lo schema DB è garantito prima delle connessioni.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  authorization-service:
    build:
      context: .
      dockerfile: authorization-service/Dockerfile
    ports:
      - "8081:8080"
    depends_on:
      build-backend:
        condition: service_completed_successfully
      # Attende payment-service healthy: Flyway ha già eseguito le migration
      # e la tabella saga_processed_events esiste prima dell'avvio di questo servizio.
      payment-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payments_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payments_pass}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  capture-service:
    build:
      context: .
      dockerfile: capture-service/Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      build-backend:
        condition: service_completed_successfully
      payment-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payments_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payments_pass}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  settlement-service:
    build:
      context: .
      dockerfile: settlement-service/Dockerfile
    ports:
      - "8083:8080"
    depends_on:
      build-backend:
        condition: service_completed_successfully
      payment-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payments_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payments_pass}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  webhook-receiver:
    build:
      context: .
      dockerfile: webhook-receiver/Dockerfile
    ports:
      - "8099:8099"
    depends_on:
      build-backend:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8099/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8084:8080"
    depends_on:
      build-backend:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      webhook-receiver:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      NOTIFICATION_WEBHOOK_DEFAULT_URL: http://webhook-receiver:8099/webhooks/payments
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  payment-ui:
    build:
      context: ./payment-ui
      args:
        VITE_API_BASE_URL: ""
    environment:
      PAYMENT_API_KEY: ${PAYMENT_API_KEY:-pgw-demo-key-32chars-minimum!!}
    ports:
      - "3000:80"
    depends_on:
      build-frontend:
        condition: service_completed_successfully
      payment-service:
        condition: service_healthy

volumes:
  postgres_data:
  kafka_data:
