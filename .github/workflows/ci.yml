name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend: build + unit tests ──────────────────────────────────────────────
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payments_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d payments_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test (unit)
        run: |
          mvn verify \
            --no-transfer-progress \
            -DexcludedGroups=integration \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/payments_test \
            -Dspring.datasource.username=test \
            -Dspring.datasource.password=test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  # ── Frontend: type-check + build ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node 22 / Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: payment-ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: payment-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
        env:
          VITE_API_BASE_URL: ''

      - name: Unit tests
        run: npm run test

  # ── Integration tests (Testcontainers — requires Docker) ────────────────────
  backend-integration:
    name: Backend integration (Testcontainers)
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: |
          mvn -pl payment-service test --no-transfer-progress \
            -Dtest=PaymentServiceIntegrationTest,PaymentApiSecurityTest,OutboxRelayIntegrationTest
          mvn -pl notification-service test --no-transfer-progress \
            -Dtest=WebhookNotificationServiceTest
          mvn -pl webhook-receiver test --no-transfer-progress \
            -Dtest=WebhookReceiverControllerTest

  # ── Docker Compose smoke test ─────────────────────────────────────────────────
  compose-smoke:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend, backend-integration]
    # Only run on push to main/develop to keep PR feedback fast
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: |
          docker compose build --parallel
          docker compose up -d --wait --wait-timeout 120

      - name: Health check — payment-service
        run: |
          curl -sf http://localhost:8080/actuator/health | grep '"status":"UP"'

      - name: Health check — payment-ui
        run: curl -sf http://localhost:3000 -o /dev/null

      - name: Health check — webhook-receiver
        run: curl -sf http://localhost:8099/actuator/health | grep '"status":"UP"'

      - name: Saga end-to-end smoke
        run: sh ./scripts/saga-e2e-smoke.sh

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
