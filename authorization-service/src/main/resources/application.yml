spring:
  config:
    import: classpath:application-kafka.yml
  application:
    name: authorization-service
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: authorization-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: payments_user
    password: payments_pass

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.finance.payment: INFO
